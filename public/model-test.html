<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #050510;
            --surface: #0a0a1a;
            --border: #ffffff10;
            --cyan: #00f0ff;
            --green: #00f0af;
            --red: #f04a60;
            --amber: #f0a500;
            --magenta: #ff006e;
            --purple: #a855f7;
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: #e2e8f0;
            padding: 1.5rem;
            min-height: 100vh;
        }
        h1 {
            font-size: 1.3rem;
            color: var(--cyan);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }
        .subtitle {
            font-size: 0.7rem;
            color: #00f0ff44;
            letter-spacing: 0.15em;
            margin-bottom: 1.5rem;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            align-items: center;
        }
        .btn {
            background: #001a1f;
            border: 1px solid #00f0ff40;
            color: var(--cyan);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-family: inherit;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #00f0ff15; border-color: var(--cyan); }
        .btn.account { border-color: #f0a50060; color: var(--amber); }
        .btn.account:hover { background: #f0a50015; }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn.danger { border-color: #f04a6060; color: var(--red); }
        .btn.danger:hover { background: #f04a6015; }
        .btn.export { border-color: #a855f760; color: var(--purple); }
        .btn.export:hover { background: #a855f715; }
        .filter-group {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #718096;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.65rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--cyan);
            color: var(--cyan);
            background: #00f0ff08;
        }
        .test-select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #a0aec0;
            padding: 0.45rem 0.6rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-family: inherit;
        }
        .section-header {
            font-size: 0.7rem;
            color: var(--cyan);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-header .count {
            color: #4a5568;
            font-size: 0.6rem;
        }
        .model-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            margin-bottom: 0.4rem;
            display: grid;
            grid-template-columns: 14px 1fr 1fr 2fr 70px;
            align-items: center;
            gap: 0.6rem;
            transition: border-color 0.3s, background 0.3s;
            font-size: 0.72rem;
        }
        .model-card.testing { border-color: #f0a50050; background: #f0a50005; }
        .model-card.ok { border-color: #00f0af40; }
        .model-card.fail { border-color: #f04a6040; }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #333;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .status-dot.testing { background: var(--amber); animation: pulse 1s infinite; }
        .status-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .status-dot.fail { background: var(--red); box-shadow: 0 0 6px var(--red); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
        .model-name { color: #cbd5e0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .model-id { color: #4a5568; font-size: 0.62rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .model-result {
            color: #718096;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-size: 0.65rem;
        }
        .model-result.ok { color: var(--green); }
        .model-result.fail { color: var(--red); }
        .latency { font-size: 0.65rem; color: #4a5568; text-align: right; font-weight: 600; }
        .latency.fast { color: var(--green); }
        .latency.medium { color: var(--amber); }
        .latency.slow { color: var(--red); }
        #summary {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.78rem;
            color: #a0aec0;
            display: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .stat-box {
            background: #05051080;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem;
            text-align: center;
        }
        .stat-box .val {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--cyan);
        }
        .stat-box .label {
            font-size: 0.6rem;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.2rem;
        }
        .progress-bar {
            width: 100%;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.8rem;
            font-size: 0.68rem;
        }
        .ranking-table th {
            text-align: left;
            color: var(--cyan);
            font-weight: 500;
            padding: 0.4rem;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.6rem;
        }
        .ranking-table td {
            padding: 0.35rem 0.4rem;
            border-bottom: 1px solid #ffffff06;
            color: #a0aec0;
        }
        .ranking-table tr:hover td { background: #ffffff04; }
        .rank-badge {
            display: inline-block;
            width: 18px; height: 18px;
            border-radius: 50%;
            text-align: center;
            line-height: 18px;
            font-size: 0.55rem;
            font-weight: 700;
            margin-right: 0.3rem;
        }
        .rank-1 { background: #ffd700; color: #000; }
        .rank-2 { background: #c0c0c0; color: #000; }
        .rank-3 { background: #cd7f32; color: #000; }
        .accuracy-bar {
            width: 60px; height: 4px;
            background: #ffffff10;
            border-radius: 2px;
            display: inline-block;
            vertical-align: middle;
            margin-left: 4px;
        }
        .accuracy-bar .fill {
            height: 100%;
            border-radius: 2px;
        }
        .hidden { display: none !important; }
        .account-bar {
            background: #0d0d20;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.8rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            font-size: 0.68rem;
        }
        .account-bar .acct-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            flex-shrink: 0;
        }
        .account-bar .acct-dot.disconnected { background: var(--red); box-shadow: 0 0 6px var(--red); }
        .account-bar .acct-label { color: #4a5568; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.6rem; }
        .account-bar .acct-user { color: var(--cyan); font-weight: 600; }
        .account-bar .acct-stat { color: #4a5568; font-size: 0.6rem; }
        .account-bar .acct-stat strong { color: var(--amber); }
        .switch-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5,5,16,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .switch-modal {
            background: #0a0a1a;
            border: 1px solid var(--cyan);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 0 60px rgba(0,240,255,0.15);
        }
        .switch-modal h2 { color: var(--cyan); font-size: 1rem; margin-bottom: 0.5rem; letter-spacing: 0.15em; }
        .switch-modal p { color: #718096; font-size: 0.75rem; margin-bottom: 1.2rem; line-height: 1.6; }
        .switch-modal .stats-line { color: var(--amber); font-size: 0.7rem; margin-bottom: 1rem; }
        @media (max-width: 768px) {
            body { padding: 0.8rem; }
            .model-card {
                grid-template-columns: 14px 1fr 60px;
                grid-template-rows: auto auto;
            }
            .model-id, .model-result { grid-column: 2 / -1; }
        }
    </style>
</head>

    <div class="subtitle">Comprehensive latency & accuracy benchmarks for simulation-grade AI models via Puter.js</div>

        <span class="acct-label">Account:</span>
        <span class="acct-user" id="acct-user">Loading...</span>
        <span class="acct-stat">Switches: <strong id="switch-count">0</strong></span>
        <span class="acct-stat">Tested on this acct: <strong id="acct-tested">0</strong></span>
        <button class="btn account" onclick="manualSwitchAccount()" style="padding:0.3rem 0.8rem;font-size:0.6rem;">⇄ Switch Account</button>
    </div>

    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>

    <div class="controls">
        <button class="btn" id="run-btn" onclick="runAllTests()">▶ Run All Tests</button>
        <button class="btn danger" id="stop-btn" onclick="stopTests()" disabled>■ Stop</button>
        <button class="btn export" id="export-btn" onclick="exportResults()" disabled>⬇ Export CSV</button>
        <select class="test-select" id="test-type">
            <option value="basic">Basic Ping (5-word reply)</option>
            <option value="sim">Simulation Accuracy (HTML gen)</option>
        </select>
        <select class="test-select" id="delay-ms" title="Delay between requests to avoid rate limits">
            <option value="0">No delay</option>
            <option value="1000">1s delay</option>
            <option value="2000" selected>2s delay</option>
            <option value="3000">3s delay</option>
            <option value="5000">5s delay</option>
        </select>
        <select class="test-select" id="batch-size" title="Models per account before auto-switching">
            <option value="10">10 per acct</option>
            <option value="20">20 per acct</option>
            <option value="50">50 per acct</option>
            <option value="999" selected>No acct limit</option>
        </select>
        <label style="display:flex;align-items:center;gap:4px;font-size:0.62rem;color:#4a5568;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;" title="Force :free tag to bypass limits and find free models">
            <input type="checkbox" id="force-free" checked style="accent-color:var(--cyan);">
            Force :free testing (bypass limits)
        </label>
        <label style="display:flex;align-items:center;gap:4px;font-size:0.62rem;color:#4a5568;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;">
            <input type="checkbox" id="free-first" style="accent-color:var(--green);">
            Free models first
        </label>
        <button class="btn" onclick="runFreeOnly()" style="border-color:#00f0af60;color:var(--green);">🆓 Run Free Only</button>
    </div>

        <span style="font-size:0.6rem;color:#4a5568;text-transform:uppercase;letter-spacing:0.1em;margin-right:0.3rem;">Filter:</span>

        Object.entries(grouped).forEach(([provider, models]) => {

        // ── Helpers ───────────────────────────────────────────────────────────
        function safeId(id) { return id.replace(/[^\w]/g, '_'); }

        function classifyLatency(ms) {
            if (ms < 3000) return 'fast';
            if (ms < 8000) return 'medium';
            return 'slow';
        }

        function scoreAccuracy(text, testType) {
            if (!text) return 0;
            if (testType === 'basic') {
                const words = text.trim().split(/\s+/);
                // Score: did they reply at all (50%) + ~5 words (50%)
                let s = 50;
                if (words.length >= 3 && words.length <= 8) s += 50;
                else if (words.length > 0) s += 25;
                return s;
            } else {
                let s = 0;
                if (text.includes('<!DOCTYPE html>') || text.includes('<!doctype html>')) s += 20;
                if (text.includes('<canvas')) s += 20;
                if (text.includes('requestAnimationFrame')) s += 20;
                if (text.includes('</html>')) s += 15;
                if (text.includes('fillStyle') || text.includes('arc(') || text.includes('fill()')) s += 15;
                if (!text.includes('```')) s += 10; // No markdown leakage
                return Math.min(100, s);
            }
        }

        // ── Sleep helper ──────────────────────────────────────────────────────
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // ── Extract text from AI response ─────────────────────────────────────
        function extractText(resp) {
            if (!resp) return '';
            if (typeof resp === 'string') return resp;
            if (resp?.message?.content) {
                if (Array.isArray(resp.message.content)) {
                    return resp.message.content.map(c => c.text || c.content || '').join('');
                }
                return resp.message.content;
            }
            if (resp?.text) return resp.text;
            return JSON.stringify(resp).slice(0, 200);
        }

        // ── Test single model (with retry + backoff) ──────────────────────────
        async function testModel(model, testType) {
            const sid = safeId(model.id);
            const dot = document.getElementById(`dot-${sid}`);
            const result = document.getElementById(`result-${sid}`);
            const latency = document.getElementById(`latency-${sid}`);
            const card = document.getElementById(`card-${sid}`);

            dot.className = 'status-dot testing';
            card.className = 'model-card testing';
            result.textContent = 'Testing...';
            result.className = 'model-result';

            const forceFree = document.getElementById('force-free').checked;
            const testModelId = (forceFree && !model.id.includes(':free')) ? model.id + ':free' : model.id;
            const isFreeModel = testModelId.includes(':free');

            const prompt = testType === 'basic' ? TEST_BASIC : TEST_SIM;
            const maxRetries = 3;

            for (let attempt = 0; attempt < maxRetries; attempt++) {
                if (attempt > 0) {
                    const backoff = Math.min(2000 * Math.pow(2, attempt), 15000);
                    result.textContent = `Retry ${attempt}/${maxRetries-1} in ${(backoff/1000).toFixed(0)}s...`;
                    await sleep(backoff);
                }

                const start = Date.now();
                try {
                    // Try with different strategies
                    let resp;

                    if (attempt === 0) {
                        // First attempt: normal call
                        resp = await puter.ai.chat(prompt, { model: testModelId });
                    } else if (attempt === 1 && !isFreeModel) {
                        // Second attempt: try testMode
                        resp = await puter.ai.chat(prompt, true, { model: testModelId });
                    } else {
                        // Third attempt: try with testMode flag in options
                        resp = await puter.ai.chat(prompt, { model: testModelId, testMode: true });
                    }

                    const ms = Date.now() - start;
                    const text = extractText(resp);
                    const accuracy = scoreAccuracy(text, testType);

                    dot.className = 'status-dot ok';
                    card.className = 'model-card ok';
                    result.className = 'model-result ok';
                    const retryTag = attempt > 0 ? ` [r${attempt}]` : '';
                    result.textContent = `✓ [${accuracy}%]${retryTag} ${text.trim().slice(0, 75)}`;
                    latency.textContent = `${ms}ms`;
                    latency.className = `latency ${classifyLatency(ms)}`;

                    const nameEl = card.querySelector('.model-name');
                    if (forceFree && !nameEl.textContent.startsWith('🆓')) {
                        const cleanName = nameEl.textContent.replace(/^[\uD800-\uDBFF][\uDC00-\uDFFF]\s*/g, '').replace(/^[^\w\s]\s*/, '');
                        nameEl.textContent = `🆓 ` + cleanName;
                        nameEl.style.color = 'var(--green)';
                    }

                    return { ok: true, model, ms, accuracy, text: text.trim().slice(0, 200), retries: attempt };
                } catch (err) {
                    const ms = Date.now() - start;
                    const errMsg = err?.message || String(err);
                    const isRetryable = isRateLimitError({ message: errMsg }) && !forceFree; // Skip retry on limits if forceFree as we just want check

                    // If it's a rate limit and we have retries left, continue
                    if (isRetryable && attempt < maxRetries - 1) {
                        result.textContent = `⚠ Rate limited, retrying...`;
                        continue;
                    }

                    // Final failure
                    dot.className = 'status-dot fail';
                    card.className = 'model-card fail';
                    result.className = 'model-result fail';
                    result.textContent = `✗ ${errMsg}`;
                    latency.textContent = `${ms}ms`;
                    latency.className = 'latency';

                    const nameEl = card.querySelector('.model-name');
                    if (forceFree && !nameEl.textContent.startsWith('💲')) {
                         const cleanName = nameEl.textContent.replace(/^[\uD800-\uDBFF][\uDC00-\uDFFF]\s*/g, '').replace(/^[^\w\s]\s*/, '');
                         nameEl.textContent = `💲 ` + cleanName;
                         nameEl.style.color = 'var(--red)';
                    }

                    return { ok: false, model, ms, accuracy: 0, err: errMsg, retries: attempt };
                }
            }
        }

        // ── Run all (free-first + delay + auto-retry + account rotation) ─────
        async function runAllTests() {
            const btn = document.getElementById('run-btn');
            const stopBtn = document.getElementById('stop-btn');
            const exportBtn = document.getElementById('export-btn');
            const progressFill = document.getElementById('progress-fill');
            const testType = document.getElementById('test-type').value;
            const batchSize = parseInt(document.getElementById('batch-size').value);
            const delayMs = parseInt(document.getElementById('delay-ms').value);
            const freeFirst = document.getElementById('free-first').checked;
            const forceFree = document.getElementById('force-free').checked;

            btn.disabled = true;
            stopBtn.disabled = false;
            exportBtn.disabled = true;
            aborted = false;
            allResults = [];
            testedOnCurrentAccount = 0;
            btn.textContent = '⏳ Running...';

            // Determine which models to test based on active filter
            let modelsToTest = activeFilter === 'all'
                ? [...MODELS]
                : MODELS.filter(m => m.provider === activeFilter);

            // Sort: free models first if enabled
            if (freeFirst) {
                modelsToTest.sort((a, b) => {
                    const aFree = a.id.includes(':free') ? 0 : 1;
                    const bFree = b.id.includes(':free') ? 0 : 1;
                    return aFree - bFree;
                });
            }

            // Reset all cards being tested
            modelsToTest.forEach(m => {
                const sid = safeId(m.id);
                document.getElementById(`dot-${sid}`).className = 'status-dot';
                document.getElementById(`result-${sid}`).textContent = 'Queued...';
                document.getElementById(`result-${sid}`).className = 'model-result';
                document.getElementById(`latency-${sid}`).textContent = '';
                document.getElementById(`latency-${sid}`).className = 'latency';
                document.getElementById(`card-${sid}`).className = 'model-card';
            });

            let consecutiveRateLimits = 0;

            for (let i = 0; i < modelsToTest.length; i++) {
                if (aborted) break;

                // Check if we need to rotate accounts (batch limit reached, ignored if forcing free test)
                if (!forceFree && batchSize < 999 && testedOnCurrentAccount >= batchSize) {
                    btn.textContent = `⇄ Switching... (${i}/${modelsToTest.length})`;
                    await switchAccountFlow(
                        `Batch limit reached: <strong>${batchSize} models</strong> tested on this account.<br>Switch to a new Puter account to continue.`
                    );
                    consecutiveRateLimits = 0;
                    btn.textContent = '⏳ Running...';
                }

                // Cooldown delay between requests
                if (delayMs > 0 && i > 0) {
                    btn.textContent = `⏳ Cooldown ${(delayMs/1000).toFixed(0)}s... (${i}/${modelsToTest.length})`;
                    await sleep(delayMs);
                    btn.textContent = '⏳ Running...';
                }

                const r = await testModel(modelsToTest[i], testType);
                allResults.push(r);
                testedOnCurrentAccount++;
                refreshAccountDisplay();
                progressFill.style.width = `${((i + 1) / modelsToTest.length) * 100}%`;

                // Check for rate limit errors after retries exhausted - trigger account switch
                if (!forceFree && !r.ok && isRateLimitError({ message: r.err })) {
                    consecutiveRateLimits++;
                    if (consecutiveRateLimits >= 2) {
                        btn.textContent = `⚠ Rate limited! Switch... (${i+1}/${modelsToTest.length})`;
                        await switchAccountFlow(
                            `⚠️ <strong>Rate limit persists after retries!</strong><br>Error: "${(r.err || '').slice(0, 100)}"<br><br>Switch to a new Puter account to continue.`
                        );
                        consecutiveRateLimits = 0;
                        i--;
                        allResults.pop();
                        btn.textContent = '⏳ Running...';
                    }
                } else {
                    consecutiveRateLimits = 0;
                }
            }

            showSummary(allResults, testType);

            btn.disabled = false;
            stopBtn.disabled = true;
            exportBtn.disabled = false;
            btn.textContent = '↺ Run Again';
            if (!aborted) progressFill.style.width = '100%';
        }

        function stopTests() {
            aborted = true;
            document.getElementById('stop-btn').disabled = true;
        }

        // ── Run only free models ──────────────────────────────────────────────
        async function runFreeOnly() {
            // Set filter to 'Free' provider and trigger run
            setFilter('Free');
            // Short delay to let UI update
            await sleep(100);
            runAllTests();
        }

        // ── Summary ───────────────────────────────────────────────────────────
        function showSummary(results, testType) {
            const summary = document.getElementById('summary');
            summary.style.display = 'block';

            const passed = results.filter(r => r.ok);
            const failed = results.filter(r => !r.ok);
            const avgMs = passed.length ? Math.round(passed.reduce((s, r) => s + r.ms, 0) / passed.length) : 0;
            const avgAccuracy = passed.length ? Math.round(passed.reduce((s, r) => s + r.accuracy, 0) / passed.length) : 0;
            const fastest = passed.length ? passed.reduce((a, b) => a.ms < b.ms ? a : b) : null;
            const mostAccurate = passed.length ? passed.reduce((a, b) => a.accuracy > b.accuracy ? a : b) : null;

            // Rank by combined score (accuracy * 0.6 + speed * 0.4)
            const maxMs = passed.length ? Math.max(...passed.map(r => r.ms)) : 1;
            const ranked = [...passed].map(r => ({
                ...r,
                speedScore: Math.round((1 - r.ms / maxMs) * 100),
                combined: Math.round(r.accuracy * 0.6 + (1 - r.ms / maxMs) * 100 * 0.4)
            })).sort((a, b) => b.combined - a.combined);

            let rankRows = ranked.slice(0, 20).map((r, i) => {
                const badgeClass = i < 3 ? `rank-badge rank-${i + 1}` : 'rank-badge';
                const badgeStyle = i >= 3 ? `style="background:#1a1a2e;color:#4a5568;"` : '';
                const accColor = r.accuracy >= 80 ? 'var(--green)' : r.accuracy >= 50 ? 'var(--amber)' : 'var(--red)';
                const accWidth = (r.accuracy / 100) * 60;
                return `<tr>
                    <td><span class="${badgeClass}" ${badgeStyle}>${i + 1}</span></td>
                    <td>${r.model.name}</td>
                    <td style="color:${accColor}">${r.accuracy}%
                        <span class="accuracy-bar"><span class="fill" style="width:${accWidth}px;background:${accColor}"></span></span>
                    </td>
                    <td class="latency ${classifyLatency(r.ms)}">${r.ms}ms</td>
                    <td>${r.speedScore}</td>
                    <td style="color:var(--cyan);font-weight:700">${r.combined}</td>
                </tr>`;
            }).join('');

            summary.innerHTML = `
                <strong style="color:var(--cyan);font-size:0.85rem;">⚗ Test Complete – ${testType === 'basic' ? 'Basic Ping' : 'Simulation Accuracy'}</strong>
                ${aborted ? '<span style="color:var(--amber);margin-left:8px;">(Stopped early)</span>' : ''}
                <div class="stats-grid">
                    <div class="stat-box"><div class="val" style="color:var(--green)">${passed.length}</div><div class="label">Passed</div></div>
                    <div class="stat-box"><div class="val" style="color:var(--red)">${failed.length}</div><div class="label">Failed</div></div>
                    <div class="stat-box"><div class="val">${avgMs}ms</div><div class="label">Avg Latency</div></div>
                    <div class="stat-box"><div class="val">${avgAccuracy}%</div><div class="label">Avg Accuracy</div></div>
                    <div class="stat-box"><div class="val" style="color:var(--green);font-size:0.9rem">${fastest ? fastest.model.name : '—'}</div><div class="label">⚡ Fastest (${fastest ? fastest.ms + 'ms' : '—'})</div></div>
                    <div class="stat-box"><div class="val" style="color:var(--magenta);font-size:0.9rem">${mostAccurate ? mostAccurate.model.name : '—'}</div><div class="label">🎯 Most Accurate (${mostAccurate ? mostAccurate.accuracy + '%' : '—'})</div></div>
                </div>
                ${ranked.length > 0 ? `
                <div style="margin-top:1.2rem;">
                    <div style="font-size:0.7rem;color:var(--cyan);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.4rem;">🏆 Simulation Readiness Ranking <span style="color:#4a5568">(60% Accuracy + 40% Speed)</span></div>
                    <table class="ranking-table">
                        <tr><th>#</th><th>Model</th><th>Accuracy</th><th>Latency</th><th>Speed</th><th>Score</th></tr>
                        ${rankRows}
                    </table>
                </div>
                ` : ''}
                ${failed.length > 0 ? `
                    <div style="margin-top:0.8rem;padding:0.5rem;background:#f04a6008;border:1px solid #f04a6020;border-radius:6px;font-size:0.65rem;color:var(--red);">
                        ❌ Failed: ${failed.map(r => r.model.name).join(', ')}
                    </div>
                ` : ''}
            `;
        }

        // ── Export CSV ─────────────────────────────────────────────────────────
        function exportResults() {
            if (!allResults.length) return;
            const header = 'Rank,Model,Provider,ID,Status,Latency(ms),Accuracy(%),Response\n';
            const maxMs = Math.max(...allResults.filter(r => r.ok).map(r => r.ms), 1);
            const sorted = [...allResults].sort((a, b) => {
                const sa = a.ok ? a.accuracy * 0.6 + (1 - a.ms / maxMs) * 100 * 0.4 : -1;
                const sb = b.ok ? b.accuracy * 0.6 + (1 - b.ms / maxMs) * 100 * 0.4 : -1;
                return sb - sa;
            });
            const rows = sorted.map((r, i) =>
                `${i + 1},"${r.model.name}","${r.model.provider}","${r.model.id}",${r.ok ? 'PASS' : 'FAIL'},${r.ms},${r.accuracy},"${(r.text || r.err || '').replace(/"/g, '""').slice(0, 100)}"`
            ).join('\n');

            const blob = new Blob([header + rows], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `vizulab-model-test-${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
